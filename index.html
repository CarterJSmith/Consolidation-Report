<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Memory File Uploader</title>
    <link rel="stylesheet" href="style.css">
    <script src="generateReport.js" defer></script>
    <!-- Sheetjs used for parsing excel files -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <!-- JSPdf used for pdf generation and auto table used for table generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

</head>
<body class="page-layout">

    <div class="app-card">
        <header class="app-header">
            <h1 class="title">Consolidation Report</h1>
            <p class="subtitle">Upload a file to generate a consolidated report for your warehouse.</p>
        </header>

        <!-- Large Upload Zone -->
        <div id="drop-zone" class="upload-zone">
            <input type="file" id="file-input" class="hidden-input">
            <div class="upload-content">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                </div>
                <div class="text-group">
                    <p class="prompt-text">Click to upload or drag and drop</p>
                    <!-- <p class="info-text">File is stored locally in memory</p> -->
                </div>
            </div>
        </div>

        <div id="progress-container" class="progress-container hidden">
            <div class="progress-info">
                <span>Reading into memory...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-track">
                <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div id="result-area" class="result-area hidden">
            <div class="metadata-container">
                <h3 class="section-label">Upload Complete</h3>
                <dl class="metadata-grid">
                    <div class="meta-item accent-blue">
                        <dt>File Name</dt>
                        <dd id="meta-name"></dd>
                    </div>
                </dl>
            </div>

            <div class="status-banner">
                <div class="status-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
                <p>Successfully Uploaded.</p>
            </div>
            <div>
                <div class="action-area" >
                    <button type="button" class="btn" id="edit-button">Edit Report</button>
                    <button type="button" class="btn" id="generate-button">Generate Report</button>
                </div>
            </div>

            <div class="edit-report">
                <!-- Placeholder for edit report values -->
            </div>
        </div>
    </div>

    <!-- Edit Report Modal -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Configure Report</h2>
                <button class="modal-close" id="close-modal-icon">&times;</button>
            </div>
            
            <div class="modal-body modal-grid">
                <!-- Left Column: Dynamic & Scrollable -->
                <div class="column-container">
                    <h3 class="column-title">Included Aisles In Report</h3>
                    
                    <!-- Select All Toggle -->
                    <div class="select-all-container">
                        <label class="checkbox-item select-all-item">
                            <input type="checkbox" id="select-all-sources">
                            <span>Select All Sources</span>
                        </label>
                    </div>

                    <div class="options-list scrollable-list" id="dynamic-list">
                        <!-- Populated via JavaScript -->
                    </div>
                </div>

                <!-- Right Column: Static -->
                <div class="column-container">
                    <h3 class="column-title">Report Features</h3>
                    <div class="options-list">
                        <label class="checkbox-item">
                            <input type="checkbox" checked id="opt-barcode">
                            <span>Display Barcode</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" checked id="opt-inventory">
                            <span>Detailed Inventory Breakdown</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="opt-financials">
                            <span>Include Financial Projections</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" checked id="opt-charts">
                            <span>Generate Charts & Graphs</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="opt-raw">
                            <span>Append Raw Data Sheet</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-outline" id="cancel-edit">Cancel</button>
                <button type="button" class="btn" id="save-edit">Save Changes</button>
            </div>
        </div>
    </div>

</body>
</html>
